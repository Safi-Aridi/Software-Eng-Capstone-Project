<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect all 404s back to the SPA root so React Router can handle the path.
      const path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
